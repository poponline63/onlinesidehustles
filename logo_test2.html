<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Logo Test 2 — Alternatives</title>
<style>
body{background:#111c2e;font-family:sans-serif;padding:20px;color:#fff;}
.grid{display:flex;flex-wrap:wrap;gap:12px;}
.item{background:#0f1723;border:1px solid rgba(110,231,183,.2);border-radius:10px;padding:10px;text-align:center;width:140px;}
.item img{width:80px;height:80px;object-fit:contain;border-radius:10px;background:#1a2840;display:block;margin:0 auto 6px;}
.item .name{font-size:10px;color:#94a3b8;word-break:break-all;}
</style></head><body>
<h3 style="color:#6ee7b7">Testing alternative logo sources for problem casinos</h3>
<div class="grid" id="grid"></div>
<script>
const GF = d => `https://t1.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://${d}&size=256`;
const tests = [
  // LuckyLand alternatives
  ['LL: luckylandslots.com', GF('luckylandslots.com')],
  ['LL: luckyland.com', GF('luckyland.com')],
  ['LL: luckylandcasino.com', GF('luckylandcasino.com')],
  ['LL: play.luckylandslots.com', GF('play.luckylandslots.com')],
  // Moonspin alternatives
  ['MS: moonspin.com', GF('moonspin.com')],
  ['MS: app.moonspin.com', GF('app.moonspin.com')],
  ['MS: moonspin.io', GF('moonspin.io')],
  // Spree alternatives
  ['SP: spree.casino', GF('spree.casino')],
  ['SP: spree.com', GF('spree.com')],
  ['SP: spree.social', GF('spree.social')],
  ['SP: spreecasino.com', GF('spreecasino.com')],
  // Fliff check
  ['Fliff: getfliff.com', GF('getfliff.com')],
  ['Fliff: fliff.com', GF('fliff.com')],
  // Hello Millions check
  ['HM: hellomillions.com', GF('hellomillions.com')],
  // RealPrize check
  ['RP: realprize.com', GF('realprize.com')],
];
const g = document.getElementById('grid');
tests.forEach(([name, url]) => {
  g.innerHTML += `<div class="item">
    <img src="${url}" onerror="this.style.opacity=0.2" title="${url}">
    <div class="name">${name}</div>
  </div>`;
});
</script></body></html>
