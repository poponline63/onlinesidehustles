name: Ensure Blog Author

on:
  push:
    branches:
      - main
    paths:
      - 'blog/**.html'

jobs:
  ensure-author:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply Nate Sterling authorship
        run: python ensure_author.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add blog/*.html
          git diff --staged --quiet || git commit -m "Ensure Nate Sterling authorship on blog posts [skip ci]"
          git push
