<!DOCTYPE html><html><head>
  <meta name="robots" content="noindex, nofollow"><meta charset="UTF-8"><title>Logo Test</title>
<style>
body{background:#111c2e;font-family:sans-serif;padding:20px;color:#fff;}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:16px;}
.item{background:#0f1723;border:1px solid rgba(110,231,183,.2);border-radius:10px;padding:12px;text-align:center;}
.item img{width:80px;height:80px;object-fit:contain;border-radius:10px;background:#1a2840;display:block;margin:0 auto 8px;}
.item .name{font-size:11px;color:#94a3b8;}
.item .src{font-size:9px;color:#4a5a6a;word-break:break-all;margin-top:4px;}
</style></head><body>
<h2 style="color:#6ee7b7">Casino Logo Test — Google Favicon API (256px)</h2>
<div class="grid" id="grid"></div>
<script>
const GF = d => `https://t1.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://${d}&size=256`;
const casinos = [
  ['Stake.us','stake.us'],
  ['Pulsz','pulsz.com'],
  ['Zula Casino','zulacasino.com'],
  ['Chumba Casino','chumbacasino.com'],
  ['Crown Coins','crowncoins.com'],
  ['Sportzino','sportzino.com'],
  ['McLuck','mcluck.com'],
  ['Global Poker','globalpoker.com'],
  ['LuckyLand Slots','luckylandslots.com'],
  ['RealPrize','realprize.com'],
  ['Fliff','getfliff.com'],
  ['Moonspin','moonspin.com'],
  ['Fortune Coins','fortunecoins.com'],
  ['WOW Vegas','wowvegas.com'],
  ['Golden Hearts','goldenheartsgames.com'],
  ['High 5 Casino','high5casino.com'],
  ['Chanced','chanced.com'],
  ['Hello Millions','hellomillions.com'],
  ['Modo Casino','modo.us'],
  ['NoLimitCoins','nolimitcoins.com'],
  ['Spree Casino','spree.casino'],
  ['Funrize','funrize.com'],
  ['Sweeptastic','sweeptastic.com'],
  ['Tao Fortune','taofortune.com'],
];
const g = document.getElementById('grid');
casinos.forEach(([name, domain]) => {
  const url = GF(domain);
  g.innerHTML += `<div class="item">
    <img src="${url}" onerror="this.style.opacity=0.3;this.title='FAILED'" title="${domain}">
    <div class="name">${name}</div>
    <div class="src">${domain}</div>
  </div>`;
});
</script></body></html>
